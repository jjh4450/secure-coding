{% extends 'base.html' %}
{% block title %}새 상품 등록{% endblock %}
{% block content %}
  <h2>새 상품 등록</h2>
  <form method="post" action="{{ url_for('new_product') }}" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="title">상품명 <span class="muted">(100자 이내)</span></label>
    <input id="title" type="text" name="title" maxlength="100" required>
    <label for="description">설명 <span class="muted">(2000자 이내)</span></label>
    <textarea id="description" name="description" maxlength="2000" required></textarea>
    <label for="price">가격 (P) <span class="muted">(1 ~ 100,000,000)</span></label>
    <input id="price" type="number" name="price" min="1" max="100000000" required>
    <label for="image">사진 <span class="muted">(png/jpg/gif/webp, 최대 2MB, 선택)</span></label>
    <input id="image" type="file" name="image" accept=".png,.jpg,.jpeg,.gif,.webp">
    <button type="submit">등록하기</button>
  </form>
{% endblock %}
