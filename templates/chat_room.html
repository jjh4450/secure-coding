{% extends 'base.html' %}
{% block title %}{{ peer['username'] }}님과의 대화{% endblock %}
{% block content %}
  <h2>{{ peer['username'] }}님과의 대화</h2>
  <div id="dm-root" data-peer-id="{{ peer['id'] }}">
    <div id="dm-messages" class="dm-messages">
      {% for m in messages %}
        <div class="msg"><span class="who">{{ m['sender_name'] }}:</span><span> {{ m['content'] }}</span></div>
      {% endfor %}
    </div>
    <form id="dm_form" class="chat-form">
      <input id="dm_input" type="text" maxlength="500" placeholder="메시지를 입력하세요" autocomplete="off">
      <button type="submit">전송</button>
    </form>
  </div>
{% endblock %}

{% block scripts %}
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="{{ url_for('static', filename='js/dm_chat.js') }}"></script>
{% endblock %}
