{% extends 'base.html' %}
{% block title %}상품 수정{% endblock %}
{% block content %}
  <h2>상품 수정</h2>
  <form method="post" action="{{ url_for('edit_product', product_id=product['id']) }}" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="title">상품명</label>
    <input id="title" type="text" name="title" maxlength="100" value="{{ product['title'] }}" required>
    <label for="description">설명</label>
    <textarea id="description" name="description" maxlength="2000" required>{{ product['description'] }}</textarea>
    <label for="price">가격 (P)</label>
    <input id="price" type="number" name="price" min="1" max="100000000" value="{{ product['price'] }}" required>
    <label for="image">사진 교체 <span class="muted">(선택)</span></label>
    <input id="image" type="file" name="image" accept=".png,.jpg,.jpeg,.gif,.webp">
    <button type="submit">저장</button>
  </form>
{% endblock %}
