{% extends 'base.html' %}
{% block title %}신고하기{% endblock %}
{% block content %}
  <h2>신고하기</h2>
  <p class="muted">부적절한 상품이나 악성 사용자를 신고할 수 있습니다. 서로 다른 사용자에게
    {{ '일정 횟수' }} 이상 신고되면 자동으로 상품이 차단되거나 계정이 휴면 처리됩니다.</p>
  <form method="post" action="{{ url_for('report') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="target_type">신고 유형</label>
    <select id="target_type" name="target_type">
      <option value="product" {% if target_type == 'product' %}selected{% endif %}>상품</option>
      <option value="user" {% if target_type == 'user' %}selected{% endif %}>사용자</option>
    </select>
    <label for="target_id">대상 ID <span class="muted">(상품/사용자 ID)</span></label>
    <input id="target_id" type="text" name="target_id" value="{{ target_id }}" required>
    <label for="reason">신고 사유 <span class="muted">(5~500자)</span></label>
    <textarea id="reason" name="reason" maxlength="500" required></textarea>
    <button type="submit">신고 접수</button>
  </form>
{% endblock %}
