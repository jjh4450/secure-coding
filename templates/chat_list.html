{% extends 'base.html' %}
{% block title %}1:1 채팅{% endblock %}
{% block content %}
  <h2>1:1 채팅</h2>
  {% if rooms %}
    <ul class="list">
      {% for room in rooms %}
        <li>
          <a href="{{ url_for('chat_room', peer_id=room['peer_id']) }}">
            {{ peers[room['peer_id']] }}
          </a>
          <span class="muted">{{ room['last_content'] }}</span>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="muted">아직 대화가 없습니다. 상품 상세나 유저 프로필에서 대화를 시작해보세요.</p>
  {% endif %}
{% endblock %}
