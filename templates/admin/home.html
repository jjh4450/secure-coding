{% extends 'base.html' %}
{% block title %}관리자{% endblock %}
{% block content %}
  <h2>관리자 대시보드</h2>
  <p class="muted">플랫폼의 모든 요소를 관리합니다.</p>
  <table>
    <tbody>
      <tr><td>전체 사용자</td><td><strong>{{ stats['users'] }}</strong>명</td></tr>
      <tr><td>전체 상품</td><td><strong>{{ stats['products'] }}</strong>개</td></tr>
      <tr><td>미처리 신고</td><td><strong>{{ stats['reports'] }}</strong>건</td></tr>
    </tbody>
  </table>
  <div class="btn-row" style="margin-top:20px">
    <a class="btn" href="{{ url_for('admin_users') }}">사용자 관리</a>
    <a class="btn" href="{{ url_for('admin_products') }}">상품 관리</a>
    <a class="btn" href="{{ url_for('admin_reports') }}">신고 관리</a>
  </div>
{% endblock %}
